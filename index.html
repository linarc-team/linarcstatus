<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linarc Team Status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --surface: #0a0a0a;
      --surface-hover: #141414;
      --accent: #ffffff;
      --muted: #666666;
      --success: #40d27f;
      --warn: #ffb347;
      --error: #ff5c5c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--accent);
      min-height: 100vh;
      padding: 0;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 32px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
      padding: 32px 0 40px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 48px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand img {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.2);
      filter: grayscale(100%) contrast(1.3) invert(1);
      transition: transform 0.3s ease;
    }

    .brand:hover img {
      transform: scale(1.05);
    }

    .brand h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.8px;
      text-decoration: underline;
      text-decoration-color: var(--accent);
      text-decoration-thickness: 2px;
      text-underline-offset: 6px;
      margin-bottom: 4px;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
      margin-top: 4px;
    }

    .meta strong {
      color: var(--accent);
      font-weight: 500;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--success);
      color: var(--bg);
      padding: 12px 24px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-size: 11px;
      border: none;
      transition: all 0.2s ease;
    }

    .status-chip:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(64, 210, 127, 0.3);
    }

    .status-chip span:last-child {
      text-decoration: underline;
      text-decoration-color: var(--bg);
      text-decoration-thickness: 1.5px;
      text-underline-offset: 2px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      background: var(--success);
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 2px var(--success);
    }

    .panel {
      margin-top: 0;
    }

    .panel h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--muted);
      margin-bottom: 16px;
      text-decoration: underline;
      text-decoration-color: var(--accent);
      text-decoration-thickness: 1px;
      text-underline-offset: 4px;
    }

    .panel p.desc {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 48px;
      max-width: 700px;
      line-height: 1.6;
    }

    .grid {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card {
      background: var(--surface);
      padding: 32px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.3s ease;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--success);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover {
      background: var(--surface-hover);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      margin-bottom: 28px;
    }

    .card h3 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.4px;
      text-decoration: underline;
      text-decoration-color: var(--accent);
      text-decoration-thickness: 1.5px;
      text-underline-offset: 4px;
    }

    .pill {
      padding: 6px 14px;
      font-size: 10px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--success);
      color: var(--bg);
      border: none;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      text-decoration: underline;
      text-decoration-color: var(--bg);
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
      transition: all 0.2s ease;
    }

    .pill:hover {
      transform: scale(1.05);
    }

    .pill.warn {
      background: transparent;
      color: var(--warn);
      border: 1px solid var(--warn);
      text-decoration: underline;
      text-decoration-color: var(--warn);
    }

    .pill.error {
      background: transparent;
      color: var(--error);
      border: 1px solid var(--error);
      text-decoration: underline;
      text-decoration-color: var(--error);
    }

    .sparkline {
      display: grid;
      grid-template-columns: repeat(30, 1fr);
      gap: 4px;
      margin: 0 0 24px;
      align-items: end;
      height: 80px;
      padding: 8px 0;
    }

    .bar {
      height: 100%;
      background: var(--success);
      position: relative;
      transition: all 0.2s ease;
      cursor: pointer;
      min-height: 8px;
    }

    .bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.2), transparent);
    }

    .bar.warn {
      background: var(--warn);
    }

    .bar.error {
      background: var(--error);
    }

    .bar:hover {
      transform: scaleY(1.15);
      filter: brightness(1.1);
    }

    .uptime-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 12px;
      padding: 0 2px;
    }

    .uptime-row strong {
      color: var(--accent);
      font-weight: 600;
      font-size: 15px;
      text-decoration: underline;
      text-decoration-color: var(--accent);
      text-decoration-thickness: 1.5px;
      text-underline-offset: 3px;
    }

    .timeline {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 11px;
      margin-top: 8px;
      padding: 0 2px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .card > div:last-child {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .footer {
      margin-top: 60px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding-top: 32px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    @media (max-width: 768px) {
      .page {
        padding: 40px 20px;
      }

      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
      }

      .status-chip {
        width: 100%;
        justify-content: center;
      }

      .card {
        padding: 24px;
      }

      .card-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .uptime-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="brand">
        <img src="https://static.vecteezy.com/ti/vetor-gratis/p1/4967560-dark-crow-head-illustraton-simple-vetor.jpg" alt="Linarc Team" />
        <div>
          <h1>Linarc Team Status</h1>
          <div class="meta" id="meta-info">
            <!-- filled by JS -->
          </div>
        </div>
      </div>
      <div class="status-chip" id="overall-chip">
        <span class="status-dot"></span>
        <span>Todos os sistemas operando</span>
      </div>
    </header>

    <section class="panel">
      <h2>Visão Geral</h2>
      <p class="desc">Monitoramento dos últimos 30 dias. Tudo é calculado automaticamente a partir dos registros de eventos.</p>
      <div class="grid" id="cards"></div>
    </section>

    <div class="footer">
    </div>
  </div>

  <script>
    // Configuração de eventos (edite aqui)
    // day: 29 = hoje, 28 = ontem ... 0 = 30 dias atrás
    // status: 'ok' | 'outage' | 'down'
    const services = {
      // deixe vazio para tudo verde; adicione incidentes de exemplo comentando/descomentando abaixo
      bots: [
        // {
        //   day: 19, // fixo na linha do tempo (10 dias atrás dentro da janela de 30)
        //   status: 'outage',
        //   reason: 'Instabilidade por muitos usos',
        //   duration: '45 mins',
        //   date: '01/12/2025'
        // }
      ],
      website: [],
      server: [],
      mainComputer: [],
      teamComputer: [],
      teamOS: [],
    };

    // Mapeamento de exibição
    const serviceMeta = {
      bots: { label: 'Bot', emoji: '🤖' },
      website: { label: 'Website', emoji: '🕸️' },
      server: { label: 'Server', emoji: '🗄️' },
      mainComputer: { label: 'Main Computer', emoji: '💻' },
      teamComputer: { label: 'Team Computer', emoji: '🧑‍💻' },
      teamOS: { label: 'Team OS', emoji: '🛠️' },
    };

    function buildBars(events) {
      const bars = [];
      for (let i = 0; i < 30; i++) {
        const hit = events.find(e => e.day === i);
        let cls = 'ok';
        if (hit) {
          cls = hit.status === 'down' ? 'error' : 'warn';
        }
        bars.push({ cls, hit, dayIndex: i });
      }
      return bars.reverse(); // mostra hoje à direita
    }

    function uptime(events) {
      const impacted = events.length;
      const score = Math.max(0, 30 - impacted) / 30;
      return (score * 100).toFixed(2);
    }

    function latestIssue(events) {
      if (!events.length) return null;
      return [...events].sort((a, b) => b.day - a.day)[0];
    }

    function formatDateFromDay(dayIndex) {
      const date = new Date();
      date.setDate(date.getDate() - (29 - dayIndex));
      return date.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
    }

    function getDisplayDate(hit, dayIndex) {
      if (hit?.date) return hit.date;
      return formatDateFromDay(dayIndex);
    }

    function barLabel(hit, dayIndex) {
      if (!hit) return `Estável • ${getDisplayDate(null, dayIndex)}`;
      const label = hit.status === 'down' ? 'Fora do ar' : 'Instabilidade por muitos usos';
      return `${label} • ${hit.reason || 'Sem detalhes'} • ${getDisplayDate(hit, dayIndex)}`;
    }

    function render() {
      const cards = document.getElementById('cards');
      cards.innerHTML = '';

      const now = new Date();
      const metaInfo = document.getElementById('meta-info');
      metaInfo.textContent = `Atualizado automaticamente em ${now.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' })} • ${now.toLocaleTimeString('pt-BR')}`;

      let anyWarn = false;
      let anyError = false;

      Object.entries(serviceMeta).forEach(([key, { label, emoji }]) => {
        const events = services[key] || [];
        const bars = buildBars(events);
        const lastIssue = latestIssue(events);
        const up = uptime(events);

        if (lastIssue?.status === 'down') anyError = true;
        if (lastIssue && lastIssue.status !== 'down') anyWarn = true;

        let pillClass = '';
        let pillText = 'Estável';
        if (lastIssue) {
          pillClass = lastIssue.status === 'down' ? 'error' : '';
          pillText = lastIssue.status === 'down' ? 'Incidente crítico' : 'Estável';
        }

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-header">
            <h3>${emoji} ${label}</h3>
            <span class="pill ${pillClass}">${pillText}</span>
          </div>
          <div class="sparkline">
            ${bars.map(b => {
              const barClass = b.cls === 'ok' ? 'bar' : `bar ${b.cls}`;
              return `<div class="${barClass}" title="${barLabel(b.hit, b.dayIndex)}"></div>`;
            }).join('')}
          </div>
          <div class="uptime-row">
            <span>30 dias atrás</span>
            <strong>${up}% uptime</strong>
            <span>Hoje</span>
          </div>
          <div class="timeline">
            <span>30d</span>
            <span>20d</span>
            <span>10d</span>
            <span>Hoje</span>
          </div>
          ${lastIssue ? `<div>
            Último incidente: ${getDisplayDate(lastIssue, lastIssue.day)} — ${lastIssue.reason} (${lastIssue.duration})
          </div>` : `<div>Sem incidentes registrados.</div>`}
        `;
        cards.appendChild(card);
      });

      const chip = document.getElementById('overall-chip');
      const dot = chip.querySelector('.status-dot');
      const label = chip.querySelector('span:last-child');
      if (anyError) {
        dot.style.background = 'var(--accent)';
        dot.style.boxShadow = 'none';
        chip.style.color = 'var(--bg)';
        chip.style.background = 'var(--accent)';
        label.textContent = 'Incidentes em andamento';
      } else if (anyWarn) {
        dot.style.background = 'var(--success)';
        dot.style.boxShadow = 'none';
        chip.style.color = 'var(--bg)';
        chip.style.background = 'var(--success)';
        label.textContent = 'Estável';
      } else {
        dot.style.background = 'var(--success)';
        dot.style.boxShadow = 'none';
        chip.style.color = 'var(--bg)';
        chip.style.background = 'var(--success)';
        label.textContent = 'Todos os sistemas operando';
      }
    }

    render();
  </script>
</body>
</html>
